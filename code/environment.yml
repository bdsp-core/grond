# foe — legacy Python 3.8 environment for the signal-processing portions
# of the pipeline that depend on fooof, pyhht, pingouin, and statsmodels.
#
# This is a sibling to code/morgoth.yml (the modern Python 3.11 `morgoth`
# environment used for everything else: PyTorch model training and
# inference, the figure-generation scripts, the discharge-locked
# topographic localization viewer, and the PD-Profiler / RDA-Profiler
# pipelines).
#
# Most things in this repo run under `morgoth`. Use `foe` only when you
# specifically need:
#   - fooof / pyhht / pingouin (early frequency-estimation experiments
#     under code/archive/hemi_detector_experiments/)
#   - statsmodels / seaborn / xarray (legacy IRR analysis)
#
# Create with:
#     conda env create -f code/environment.yml
#     conda activate foe
#
# Exported with `conda env export -n foe --no-builds` to keep version
# pins (for reproducibility) while dropping macOS-specific build hashes
# (so the file installs on Linux as well).

name: foe
channels:
  - conda-forge
dependencies:
  - bzip2=1.0.8
  - ca-certificates=2026.2.25
  - icu=78.2
  - libffi=3.5.2
  - liblzma=5.8.2
  - liblzma-devel=5.8.2
  - libsqlite=3.52.0
  - libzlib=1.3.1
  - ncurses=6.5
  - openssl=3.6.1
  - pip=24.3.1
  - python=3.8.20
  - readline=8.3
  - setuptools=75.3.0
  - tk=8.6.13
  - wheel=0.45.1
  - xz=5.8.2
  - xz-gpl-tools=5.8.2
  - xz-tools=5.8.2
  - pip:
