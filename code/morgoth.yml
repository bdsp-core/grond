# morgoth — modern Python 3.11 environment for the deep-learning portions
# of the pipeline (PyTorch model training and inference, figure generation
# scripts, the discharge-locked topographic localization viewer).
#
# This is a sibling to code/environment.yml (the older Python 3.8 `foe`
# environment used for legacy signal-processing scripts that depend on
# fooof, pyhht, and pingouin). Most things in this repo can run under
# either environment, but a few things require one specific environment:
#
#   - PyTorch model training/inference (ChannelPD-Net, HemiCET-UNet,
#     CET-UNet) requires `morgoth` because `foe` does not have torch.
#   - Legacy frequency-estimation experiments under
#     code/archive/hemi_detector_experiments/ rely on fooof/pyhht/pingouin
#     and must run under `foe`.
#
# Create with:
#     conda env create -f code/morgoth.yml
#     conda activate morgoth
#
# Exported with `conda env export -n morgoth --no-builds` to keep version
# pins (for reproducibility) while dropping macOS-specific build hashes
# (so the file installs on Linux as well).

name: morgoth
channels:
  - conda-forge
dependencies:
  - bzip2=1.0.8
  - ca-certificates=2026.2.25
  - icu=78.2
  - libexpat=2.7.4
  - libffi=3.5.2
  - liblzma=5.8.2
  - libsqlite=3.52.0
  - libzlib=1.3.1
  - ncurses=6.5
  - openssl=3.6.1
  - packaging=26.0
  - pip=26.0.1
  - python=3.11.15
  - readline=8.3
  - setuptools=82.0.1
  - tk=8.6.13
  - tzdata=2025c
  - wheel=0.46.3
